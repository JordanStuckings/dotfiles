# ──────────────────────────────────────────────────────────────
# tv cable channel: sesh
#
# Bridges television → sesh for tmux session management.
# Usage: `tv sesh` or bind to a tmux key (see Phase 4 in TODO.md)
#
# Data sources (cycled with Ctrl-S):
#   1. Everything: sesh sessions + project dirs + ~/.config dirs (deduped)
#   2. Active tmux sessions only
#   3. Directories only: zoxide frecent + ~/projects + ~/.config (deduped)
#
# Keybindings:
#   Enter  → connect to selected session
#   Ctrl-D → kill selected session + reload list
# ──────────────────────────────────────────────────────────────

[metadata]
name = "sesh"
description = "Session manager integrating tmux sessions, zoxide directories, and config paths"
requirements = ["sesh", "fd"]

[source]
command = [
  "{ sesh list -t | sed \"s|^$HOME|~|\" | sed 's|^| |'; { sesh list -z | sed \"s|^$HOME|~|\"; fd -d 1 -t d . ~/projects ~/.config | sed \"s|/$||; s|^$HOME|~|\"; } | awk '!seen[$0]++' | sed 's|^|📁 |'; } | awk '{k=$0; sub(/^[^ ]+ /,\"\",k); if(!seen[k]++) print}'",
  "sesh list -t | sed \"s|^$HOME|~|\" | sed 's|^| |'",
  "{ sesh list -z | sed \"s|^$HOME|~|\"; fd -d 1 -t d . ~/projects ~/.config | sed \"s|/$||; s|^$HOME|~|\"; } | awk '!seen[$0]++' | sed 's|^|📁 |'"
]
ansi = false
output = "{split: :1..|join: }"

[preview]
command = "sesh preview '{split: :1..|join: }'"

[keybindings]
enter = "actions:connect"
ctrl-d = ["actions:kill_session", "reload_source"]

[actions.connect]
description = "Connect to selected session"
command = "sh -c 'target=\"$1\"; case \"$target\" in /*) name=$(basename \"$target\"); if [ -n \"$TMUX\" ]; then tmux has-session -t \"$name\" 2>/dev/null || tmux new-session -d -s \"$name\" -c \"$target\"; tmux switch-client -t \"$name\"; else tmux new-session -A -s \"$name\" -c \"$target\"; fi ;; *) sesh connect \"$target\" ;; esac' sh '{split: :1..|join: }'"
mode = "execute"

[actions.kill_session]
description = "Kill selected tmux session (press Ctrl+r to reload)"
command = "tmux kill-session -t '{split: :1..|join: }'"
mode = "fork"
