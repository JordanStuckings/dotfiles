# ──────────────────────────────────────────────────────────────
# tv cable channel: channels
#
# Meta-channel: fuzzy find and switch to other tv channels.
# ──────────────────────────────────────────────────────────────

[metadata]
name = "channels"
description = "A channel to find and select other channels"

[source]
command = "tv list-channels"

[keybindings]
enter = "actions:zap"

[actions.zap]
description = "Switch to the channel"
command = "tv '{}'"
mode = "execute"
