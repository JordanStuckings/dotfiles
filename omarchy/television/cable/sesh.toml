# ──────────────────────────────────────────────────────────────
# tv cable channel: sesh
#
# Bridges television → sesh for tmux session management.
# Usage: `tv sesh` or bind to a tmux key
#
# Data sources (cycled with Ctrl-S):
#   1. Everything: sesh sessions + project dirs + ~/.config dirs
#   2. Active tmux sessions only
#   3. Config-defined sessions only
#   4. Zoxide frecent directories only
#   5. Project dirs only (~/projects, ~/.config)
#
# Keybindings:
#   Enter  → connect to selected session
#   Ctrl-D → kill selected session + reload list
# ──────────────────────────────────────────────────────────────

[metadata]
name = "sesh"
description = "Session manager integrating tmux sessions, zoxide directories, and config paths"
requirements = ["sesh", "fd"]

[source]
command = [
  "{ sesh list --icons; fd -d 1 -t d . ~/projects ~/.config | sed 's|/$||; s|^|📁 |'; }",
  "sesh list -t --icons",
  "sesh list -c --icons",
  "sesh list -z --icons",
  "fd -d 1 -t d . ~/projects ~/.config | sed 's|/$||; s|^|📁 |';",
]
ansi = true
output = "{strip_ansi|split: :1..|join: }"

[preview]
command = "sesh preview '{strip_ansi|split: :1..|join: }'"

[keybindings]
enter = "actions:connect"
ctrl-d = ["actions:kill_session", "reload_source"]

[actions.connect]
description = "Connect to selected session"
command = "sh -c 'target=\"$1\"; case \"$target\" in /*) name=$(basename \"$target\"); if [ -n \"$TMUX\" ]; then tmux has-session -t \"$name\" 2>/dev/null || tmux new-session -d -s \"$name\" -c \"$target\"; tmux switch-client -t \"$name\"; else tmux new-session -A -s \"$name\" -c \"$target\"; fi ;; *) sesh connect \"$target\" ;; esac' sh '{strip_ansi|split: :1..|join: }'"
mode = "execute"

[actions.kill_session]
description = "Kill selected tmux session (press Ctrl+r to reload)"
command = "tmux kill-session -t '{strip_ansi|split: :1..|join: }'"
mode = "fork"
