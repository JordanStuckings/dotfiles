# ──────────────────────────────────────────────────────────────
# tv cable channel: zoxide
#
# Browse zoxide frecent directory history.
#
# Keybindings:
#   Enter  → open a shell in the selected directory
#   Ctrl-D → remove the selected directory from zoxide
# ──────────────────────────────────────────────────────────────

[metadata]
name = "zoxide"
description = "Browse zoxide directory history"
requirements = ["zoxide"]

[source]
command = "zoxide query -l"
no_sort = true
frecency = false

[preview]
command = "eza -la --color=always '{}'"

[keybindings]
enter = "actions:cd"
ctrl-d = "actions:remove"

[actions.cd]
description = "Change to the selected directory"
command = "cd '{}' && $SHELL"
mode = "execute"

[actions.remove]
description = "Remove the selected directory from zoxide"
command = "zoxide remove '{}'"
mode = "fork"
