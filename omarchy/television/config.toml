# ──────────────────────────────────────────────────────────────
# television (tv) – fuzzy finder config
# https://github.com/alexpasmantier/television
#
# Location: ~/.config/television/config.toml
# ──────────────────────────────────────────────────────────────

# General settings
tick_rate = 50
default_channel = "files"
history_size = 200
global_history = false

[ui]
ui_scale = 100
orientation = "landscape"
# Use a builtin theme for more consistent picker contrast.
# Available builtins include: default, gruvbox-dark, gruvbox-light, catppuccin,
# nord-dark, dracula, onedark, tokyonight, rose-pine, rose-pine-moon, rose-pine-dawn.
theme = "tokyonight"

[ui.input_bar]
position = "top"
prompt = ">"
border_type = "rounded"

[ui.status_bar]
separator_open = ""
separator_close = ""
hidden = false

[ui.results_panel]
border_type = "rounded"

[ui.preview_panel]
size = 65
scrollbar = true
border_type = "rounded"
hidden = false

[ui.help_panel]
show_categories = true
hidden = true

[ui.remote_control]
show_channel_descriptions = true
sort_alphabetically = true

# Keybindings
# ──────────────────────────────────────────────────────────────
[keybindings]
# Application control
esc = "quit"
ctrl-c = "quit"

# Navigation
down = "select_next_entry"
ctrl-n = "select_next_entry"
ctrl-j = "select_next_entry"
up = "select_prev_entry"
ctrl-p = "select_prev_entry"
ctrl-k = "select_prev_entry"

# History
ctrl-up = "select_prev_history"
ctrl-down = "select_next_history"

# Selection
tab = "toggle_selection_down"
backtab = "toggle_selection_up"
enter = "confirm_selection"

# Preview
ctrl-d = "scroll_preview_half_page_down"
ctrl-u = "scroll_preview_half_page_up"
ctrl-f = "cycle_previews"

# Data
ctrl-y = "copy_entry_to_clipboard"
ctrl-s = "cycle_sources"

# UI toggles
ctrl-r = "toggle_remote_control"
ctrl-x = "toggle_action_picker"
ctrl-o = "toggle_preview"
f9 = "toggle_help"
f10 = "toggle_status_bar"
ctrl-t = "toggle_layout"

# Input field
backspace = "delete_prev_char"
ctrl-w = "delete_prev_word"
delete = "delete_next_char"
left = "go_to_prev_char"
right = "go_to_next_char"

# Shell integration
# ──────────────────────────────────────────────────────────────
# Context-aware autocomplete (Ctrl-T) and history search (Ctrl-R)
# in your shell. Requires sourcing tv shell integration in your
# shell profile.

[shell_integration]
fallback_channel = "files"

[shell_integration.channel_triggers]
"alias" = ["alias", "unalias"]
"env" = ["export", "unset"]
"dirs" = ["cd", "ls", "rmdir", "z"]
"files" = [
  "cat",
  "less",
  "head",
  "tail",
  "vim",
  "nano",
  "bat",
  "cp",
  "mv",
  "rm",
  "touch",
  "chmod",
  "chown",
  "ln",
  "tar",
  "zip",
  "unzip",
  "gzip",
  "gunzip",
  "xz",
]
"git-diff" = ["git add", "git restore"]
"git-branch" = [
  "git checkout",
  "git branch",
  "git merge",
  "git rebase",
  "git pull",
  "git push",
]
"git-log" = ["git log", "git show"]
"git-repos" = ["nvim", "code", "hx", "git clone"]

[shell_integration.keybindings]
"smart_autocomplete" = "ctrl-t"
"command_history" = "ctrl-r"
