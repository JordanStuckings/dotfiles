##### TERM & TRUECOLOR #########################################################
# Prefer tmux-256color if present (better than screen-256color)
set -g default-terminal "tmux-256color"

# Enable truecolor in tmux (modern tmux uses RGB instead of Tc)
set -as terminal-overrides ",*:RGB"

# Faster escapes (good for vim/neovim)
set -s escape-time 0
set -g focus-events on

##### UX BASICS ################################################################
set -g assume-paste-time 1
set -g mouse on
set -g renumber-windows on
set -g allow-rename off

##### THEME: ADAPT TO TERMINAL PALETTE #########################################
# Use terminal defaults so tmux inherits your terminal / Omarchy theme.
# Avoid hex; use 'default' and palette indices that follow your terminal theme.
# Choose neutral accents (colour8/colour7/etc) so dark/light themes both work.

# Status bar
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify centre
set -g status-style "bg=default,fg=default"

# Window titles
set -g window-status-format " #I #W "
set -g window-status-current-format "#[bold] #I #W #[nobold]"
set -g window-status-style "bg=default,fg=colour8"
set -g window-status-current-style "bg=default,fg=default"

# Pane borders
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour10"  # a green-ish accent from palette

# Messages / prompts
set -g message-style "bg=default,fg=colour14"  # cyan-ish text over your default bg
set -g message-command-style "bg=default,fg=colour14"

# Mode (copy-mode) line
set -g mode-style "bg=default,fg=colour11"     # yellow-ish prompt text

# Status content (kept minimal and neutral)
set -g status-left-length 40
set -g status-right-length 80
set -g status-left  "#[bold]#S#[nobold]"
set -g status-right "#(whoami) @ #H #[fg=colour8]|#[fg=default] %Y-%m-%d %R"

##### CLIPBOARD (SYSTEM) #######################################################
# Let tmux integrate with the system clipboard when supported
set -g set-clipboard on

##### YOUR EXISTING KEYBINDS (kept) ############################################
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind r source-file ~/.tmux.conf
set -g base-index 1

# Vim-friendly copy mode + direct clipboard
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
# If xclip is present, this still works; otherwise tmux will use set-clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Your custom launchers
bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/.dotfiles/personal/todo.md"
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind-key -r i run-shell "tmux neww tmux-cht.sh"
bind-key -r G run-shell "~/.local/bin/tmux-sessionizer ~/work/nrdp"
bind-key -r C run-shell "~/.local/bin/tmux-sessionizer ~/work/tvui"
bind-key -r R run-shell "~/.local/bin/tmux-sessionizer ~/work/milo"
# bind-key -r L run-shell "~/.local/bin/tmux-sessionizer ~/work/hpack"
bind-key -r H run-shell "~/.local/bin/tmux-sessionizer ~/personal/vim-with-me"
bind-key -r T run-shell "~/.local/bin/tmux-sessionizer ~/personal/refactoring.nvim"
bind-key -r N run-shell "~/.local/bin/tmux-sessionizer ~/personal/harpoon"
bind-key -r S run-shell "~/.local/bin/tmux-sessionizer ~/personal/developer-productivity"

